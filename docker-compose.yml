services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis

  celery-worker:
    build: .
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      - redis

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis

volumes:
  redis_data:
